services:
  # ── Backend (Web Service) ─────────────────────────
  - type: web
    name: marknotes-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: DB_PATH
        value: /var/data/notes.db
    disk:
      name: notes-db
      mountPath: /var/data
      sizeGB: 1

  # ── Frontend (Static Site) ────────────────────────
  - type: web
    name: marknotes-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: build
    envVars:
      - key: REACT_APP_API_URL
        value: https://marknotes-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
